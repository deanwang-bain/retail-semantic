services:
  neo4j:
    image: neo4j:5.26-community
    container_name: retail-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ontology-demo
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "ontology-demo", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: retail-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ontology
      POSTGRES_PASSWORD: ontology-demo
      POSTGRES_DB: retail_semantic
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ontology -d retail_semantic"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  postgres_data:
